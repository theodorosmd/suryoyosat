<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Suryoyo Sat — Live</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;background:#000;overflow:hidden}
    video{width:100vw;height:100vh;object-fit:contain;display:block;background:#000}

    .spinner{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
    .spinner svg{width:56px;height:56px;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .spinner.hidden{display:none}

    .err{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:#ff6b6b;background:#000}
    .err svg{width:48px;height:48px;fill:currentColor}
    .err p{color:#aaa;font-family:system-ui;font-size:.9rem}
    .retry{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:8px 20px;border-radius:8px;cursor:pointer;font-size:.85rem;font-family:system-ui}

    /* Unmute button */
    .unmute{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.25);color:#fff;font-family:system-ui;font-size:.85rem;padding:10px 20px;border-radius:24px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:opacity .4s;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
    .unmute svg{width:18px;height:18px;fill:#f0c930}
    .unmute.hidden{opacity:0;pointer-events:none}

    /* Live badge */
    .live{position:fixed;top:16px;left:16px;background:#e53535;color:#fff;font-family:system-ui;font-size:.7rem;font-weight:700;letter-spacing:1px;padding:4px 10px;border-radius:4px;display:flex;align-items:center;gap:6px}
    .live span{width:7px;height:7px;background:#fff;border-radius:50%;animation:pulse 1.4s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  </style>
</head>
<body>

<video id="v" autoplay muted playsinline></video>

<div class="spinner" id="spinner">
  <svg viewBox="0 0 50 50" fill="none" stroke="#f0c930" stroke-width="4">
    <circle cx="25" cy="25" r="20" stroke-dasharray="80 40"/>
  </svg>
</div>

<div class="err" id="err">
  <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
  <strong style="font-family:system-ui;color:#fff">Flux indisponible</strong>
  <p>Vérifiez votre connexion.</p>
  <button class="retry" onclick="load()">Réessayer</button>
</div>

<div class="live"><span></span>LIVE</div>

<button class="unmute" id="unmute">
  <svg viewBox="0 0 24 24"><path d="M16.5 12A4.5 4.5 0 0 0 14 7.97v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51A8.796 8.796 0 0 0 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06a8.99 8.99 0 0 0 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
  Appuyer pour activer le son
</button>

<script>
  const v = document.getElementById('v');
  const spinner = document.getElementById('spinner');
  const err = document.getElementById('err');
  const unmuteBtn = document.getElementById('unmute');
  const SRC = "https://stream-hls.castr.net/66c326077b2f5e54001a1b38/live_e7ebb6206aa411efb410076c4d9f632e/tracks-v1a1/mono.ts.m3u8";
  let hls;

  function showSpinner(x){spinner.classList.toggle('hidden',!x)}
  function showErr(x){err.style.display=x?'flex':'none'}

  function load(){
    showErr(false); showSpinner(true);
    if(hls){hls.destroy();hls=null}
    if(Hls.isSupported()){
      hls=new Hls({lowLatencyMode:true});
      hls.loadSource(SRC); hls.attachMedia(v);
      hls.on(Hls.Events.MANIFEST_PARSED,()=>v.play().catch(()=>{}));
      hls.on(Hls.Events.ERROR,(_,d)=>{if(d.fatal){showSpinner(false);showErr(true)}});
    } else if(v.canPlayType('application/vnd.apple.mpegurl')){
      v.src=SRC;
      v.play().catch(()=>{});
    } else {showSpinner(false);showErr(true)}
  }

  v.addEventListener('waiting',()=>showSpinner(true));
  v.addEventListener('playing',()=>showSpinner(false));
  v.addEventListener('canplay',()=>showSpinner(false));

  // Unmute on tap
  unmuteBtn.addEventListener('click',()=>{
    v.muted=false; v.volume=1;
    unmuteBtn.classList.add('hidden');
  });

  // Hide unmute button if already unmuted (desktop)
  if(!(/iPhone|iPad|iPod|Android/i.test(navigator.userAgent))){
    v.muted=false;
    unmuteBtn.classList.add('hidden');
  }

  load();
</script>
</body>
</html>
